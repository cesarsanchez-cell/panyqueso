name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs viejos del mismo branch/PR cuando pusheás de nuevo: no se gastan
# minutos en commits que ya quedaron pisados.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

  db-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ¿Cambió algo de la DB? Si no, saltamos el stack de Supabase (lo más caro).
      # El job igual termina en verde, así sirve como check requerido sin gastar.
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            db:
              - 'supabase/**'
              - 'scripts/test-p0004-invalid-status.sh'
              - '.github/workflows/ci.yml'

      - uses: supabase/setup-cli@v1
        if: steps.changes.outputs.db == 'true'
        with:
          version: 2.101.0

      - name: Start Supabase local stack
        if: steps.changes.outputs.db == 'true'
        # El pull de imágenes del stack a veces devuelve 502 del registry (flake
        # de infra, no del código). Reintentamos antes de fallar.
        run: |
          for i in 1 2 3; do
            if supabase start; then exit 0; fi
            echo "::warning::supabase start falló (intento $i/3), reintento…"
            supabase stop --no-backup || true
            sleep 20
          done
          echo "::error::supabase start falló tras 3 intentos"
          exit 1

      - name: Run pgTAP tests
        if: steps.changes.outputs.db == 'true'
        run: supabase test db

      - name: Manual P0004 invalid_status tests (psql-based)
        if: steps.changes.outputs.db == 'true'
        run: bash scripts/test-p0004-invalid-status.sh

      - name: Sin cambios de DB
        if: steps.changes.outputs.db != 'true'
        run: echo "No se tocó supabase/**; se omiten los db-tests (nada que probar)."
